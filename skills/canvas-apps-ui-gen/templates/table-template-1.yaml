# TEMPLATE: Responsive Data Table with Status Pills and Row Actions
# TAGS: table, grid, list, rows, data, gallery, vertical, columns, header, status, badge, pill, search, filter, action, button
# DESCRIPTION: A white-background table container with a title/action bar at the top, a sticky column header row, and a vertical gallery for data rows. Each row has a category icon, subject label, location, a colored status pill, a date, and a row-level action button. Columns use FillPortions for responsive widths. Includes a "View All" button in the title bar.
# USE WHEN: Any data list, record browser, task list, or grid with multiple columns. Handles status indicators, category icons, and row-level actions well. Responsive — columns hide on smaller screens using Size checks.
# COMPONENTS: GroupContainer@1.5.0, Gallery@2.15.0, Label@2.5.1, Image@2.2.3, Rectangle@2.3.0, Classic/Button@2.2.0
# ============================================
