# TEMPLATE: Multi-field Data Entry Form
# TAGS: form, input, fields, textinput, datepicker, combobox, dropdown, radio, number, submit, save, reset
# DESCRIPTION: A wrapping horizontal AutoLayout container holding multiple form field groups. Each field is a rounded container with a bold label on top and the input below. Fields wrap to new rows automatically (LayoutWrap: true). Includes Date, Radio, Text, Number, ComboBox, and LongText fields. Action buttons (Reset + Save) are right-aligned at the bottom.
# USE WHEN: Any screen with multiple input fields, data entry forms, edit screens, or record creation. The wrapping layout adapts to different numbers of fields automatically.
# COMPONENTS: GroupContainer@1.5.0, Label@2.5.1, DatePicker@0.0.46, Radio@0.0.25, TextInput@0.0.54, NumberInput@2.9.12, ComboBox@0.0.51, Button@0.0.45
# ============================================
